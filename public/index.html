<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Code セットアップナビ</title>
  <script type="module" src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs"></script>
  <style>
    :root {
      --bg: #eceff1;
      --panel: #f7f8f9;
      --ink: #15202b;
      --muted: #506170;
      --line: #cad2da;
      --accent: #1d7b72;
      --accent-ink: #ffffff;
      --card-bg: #2b2f34;
      --card-line: #454c56;
      --card-ink: #f3f4f6;
      --card-muted: #c9ced6;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "BIZ UDPGothic", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1000px 400px at 10% -10%, #ffffff 0%, transparent 65%),
        radial-gradient(700px 350px at 100% 0%, #e3eaee 0%, transparent 70%),
        var(--bg);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .hero {
      background: linear-gradient(165deg, #f7f9fa 0%, #eef2f4 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 28px rgba(16, 24, 40, 0.05);
      margin-bottom: 20px;
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3.4vw, 2rem);
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.97rem;
    }

    .start-wrap { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .btn-main {
      background: var(--accent);
      color: var(--accent-ink);
      box-shadow: 0 8px 20px rgba(29, 123, 114, 0.28);
    }

    .btn-secondary {
      background: #e5eaef;
      color: #1e2a35;
      border: 1px solid #c9d2da;
    }

    .status {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      color: #344453;
      margin-bottom: 16px;
      display: none;
      font-size: 0.93rem;
    }

    .phase-bars {
      display: grid;
      gap: 8px;
    }

    .phase-goal {
      font-size: 0.82rem;
      color: #345063;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .phase-row {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 8px;
      align-items: center;
    }

    .phase-dot {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 1px solid #b8c6d3;
      background: #e8edf2;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .phase-dot img {
      width: 16px;
      height: 16px;
      opacity: 0.9;
    }

    .phase-bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: #dfe6ec;
      overflow: hidden;
      border: 1px solid #c9d3dc;
    }

    .phase-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, #1d7b72 0%, #48b093 100%);
      transition: width 280ms ease;
    }

    .walker {
      position: absolute;
      bottom: 6px;
      width: 34px;
      height: 34px;
      transform: translateX(-50%);
      pointer-events: none;
      transition: left 280ms ease;
      z-index: 2;
      display: grid;
      place-items: center;
    }

    .walker dotlottie-player {
      width: 34px;
      height: 34px;
    }

    .tree {
      position: relative;
      margin-left: 16px;
      padding-left: 24px;
      border-left: 2px dashed #bfc9d2;
      display: none;
    }

    .node {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin: 0 0 16px;
      animation: fadeIn 220ms ease;
      isolation: isolate;
      transition: transform 220ms ease, opacity 220ms ease, padding 220ms ease, box-shadow 220ms ease;
    }

    .node::before {
      content: "";
      position: absolute;
      width: 16px;
      border-top: 2px dashed #bfc9d2;
      left: -24px;
      top: 26px;
    }

    .node.active-node {
      border-color: #3fc772;
      box-shadow: 0 0 0 2px rgba(63, 199, 114, 0.22), 0 12px 30px rgba(29, 64, 46, 0.12);
      transform: scale(1.01);
      padding: 16px;
    }

    .node.history-node {
      opacity: 0.46;
      max-width: 56%;
      padding: 7px 8px;
      margin-left: 8px;
    }

    .node.history-node h3 {
      font-size: 0.6rem;
      color: #5f6f7e;
      font-weight: 700;
    }

    .node.history-node .done-summary {
      font-size: 0.58rem;
      color: #718291;
    }

    .node-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .node h3 {
      margin: 0;
      font-size: 1.03rem;
      line-height: 1.35;
    }

    .badge {
      font-size: 0.8rem;
      color: #0f5f46;
      background: #d6f0e7;
      border: 1px solid #a4d9c7;
      border-radius: 999px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .node p {
      margin: 0 0 10px;
      color: #3d4f5f;
      font-size: 0.93rem;
    }

    .node.active-node p {
      color: #1c3348;
      font-weight: 700;
    }

    .choices {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .choice-btn {
      background: #edf2f6;
      border: 1px solid #c8d3dd;
      color: #20303f;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .done-summary {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #485b6c;
      border-top: 1px dashed #ccd4dc;
      padding-top: 8px;
    }

    .history-icon {
      width: 14px;
      height: 14px;
      display: inline-block;
      opacity: 0.92;
    }

    .history-pin {
      position: absolute;
      left: -33px;
      top: 17px;
      width: 14px;
      height: 14px;
      z-index: 3;
    }

    .substeps {
      margin-top: 8px;
      padding: 0;
    }

    .substep-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 4px 2px;
      transition: opacity 150ms ease, transform 150ms ease;
      opacity: 0.42;
    }

    .substep-row.current {
      opacity: 1;
      transform: scale(1.01);
    }

    .substep-row.done {
      opacity: 0.42;
    }

    .substep-toggle {
      border: 0;
      background: transparent;
      padding: 0;
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      cursor: pointer;
    }

    .substep-toggle img {
      width: 20px;
      height: 20px;
      display: block;
    }

    .substep-toggle[disabled] {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .substep-text {
      font-size: 0.9rem;
      color: #687888;
      font-weight: 600;
      transition: color 140ms ease, font-size 140ms ease, transform 140ms ease, opacity 140ms ease;
      border: 1px solid #ced8e2;
      border-radius: 8px;
      background: #f4f7fa;
      padding: 5px 8px;
      flex: 1;
    }

    .substep-row.current .substep-text {
      color: #13352d;
      font-weight: 800;
      font-size: 1rem;
      border-color: #a7cfb9;
      background: #eaf8ef;
    }

    .substep-row.done .substep-text {
      color: #5d6b79;
      font-size: 0.8rem;
      opacity: 0.78;
    }

    .ps-card {
      border: 1px solid var(--card-line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--card-bg);
      margin: 8px 0 6px;
    }

    .ps-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #343940;
      border-bottom: 1px solid var(--card-line);
      color: var(--card-muted);
      font-size: 0.82rem;
      font-weight: 700;
      position: relative;
    }

    .shell-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .shell-tag img {
      width: 14px;
      height: 14px;
      display: block;
    }

    .shell-tag .shell-blue {
      color: #6fb8ff;
      font-weight: 800;
    }

    .copy-btn {
      border: 1px solid #606b79;
      background: #3f4650;
      color: var(--card-ink);
      font-size: 0.78rem;
      padding: 6px 9px;
      border-radius: 9px;
      font-weight: 700;
    }

    .copy-tip {
      position: absolute;
      top: 36px;
      right: 8px;
      max-width: 290px;
      background: #f6fbf9;
      border: 1px solid #b9d9cb;
      border-radius: 10px;
      color: #26483c;
      box-shadow: 0 8px 24px rgba(17, 42, 32, 0.15);
      padding: 8px 9px;
      font-size: 0.78rem;
      line-height: 1.4;
      z-index: 10;
      animation: fadeIn 120ms ease;
    }

    .copy-tip-head {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .copy-tip-head img {
      width: 13px;
      height: 13px;
    }

    .copy-tip-hide {
      margin-top: 6px;
      border: 1px solid #b6c6cf;
      background: #eef3f6;
      color: #2b3d4b;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 7px;
      cursor: pointer;
    }

    pre {
      margin: 0;
      padding: 12px;
      color: var(--card-ink);
      overflow-x: auto;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.9rem;
      line-height: 1.55;
      background: var(--card-bg);
      white-space: pre;
    }

    .complete {
      display: inline-block;
      margin-top: 8px;
      background: #dceee8;
      border: 1px solid #b0d8cb;
      color: #145849;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.86rem;
    }

    .finish {
      border: 1px solid #b8d4c8;
      background: #eef9f4;
      color: #144e40;
      border-radius: 14px;
      padding: 16px;
      margin-top: 10px;
      display: none;
    }

    .celebrate {
      margin-top: 10px;
      position: relative;
      height: 8px;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: burst 900ms ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes burst {
      0% { transform: translateY(-18px) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(48px) rotate(180deg); opacity: 0; }
    }

    .screen-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }


    @media (max-width: 640px) {
      .container { padding: 16px 12px 40px; }
      .hero { padding: 18px; border-radius: 14px; }
      .tree { margin-left: 6px; padding-left: 16px; }
      .node::before { width: 10px; left: -16px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1 class="title">Claude Code セットアップナビ</h1>
      <p class="lead">最初に見えるのは次の1手だけ。完了チェックで一歩ずつ進めて、「最初の一言」まで到達します。</p>
      <div class="start-wrap">
        <button id="startBtn" class="btn-main">まずは始める</button>
        <button id="resetBtn" class="btn-secondary" type="button">最初からやり直す</button>
      </div>
    </section>

    <div id="status" class="status"></div>
    <section id="tree" class="tree" aria-live="polite"></section>
    <section id="finish" class="finish">
      <strong>セットアップ完了</strong>
      <p>最初の一言を送り、返事を受け取るところまで到達できました。</p>
    </section>
  </main>

  <script>
    const nodes = {
      select_os: {
        title: "使っているOSを選んでください",
        description: "ここで選ぶと、そのOS向けの手順だけ表示します。",
        choices: [
          { label: "Windowsで進める", next: "win_open_terminal", summary: "Windowsルートを選択", flow: "win" },
          { label: "Macで進める", next: "mac_open_terminal", summary: "Macルートを選択", flow: "mac" }
        ]
      },

      win_open_terminal: {
        title: "Windows: まず PowerShell を開く",
        description: "Windowsキー + R を押して、下の文字を貼り付けて Enter を押します。",
        command: "powershell",
        shellLabel: "Win + R に入力",
        choices: [
          { label: "PowerShell を開けた", next: "win_check_antigravity", summary: "PowerShell を起動" }
        ]
      },

      win_check_antigravity: {
        title: "Windows: Antigravity のインストール確認",
        description: "下の確認コマンドを実行して、結果が出るか確認します。",
        command: "$apps = @()\n$apps += Get-ItemProperty HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\* -ErrorAction SilentlyContinue\n$apps += Get-ItemProperty HKLM:\\Software\\WOW6432Node\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\* -ErrorAction SilentlyContinue\n$apps += Get-ItemProperty HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\* -ErrorAction SilentlyContinue\n$apps | Where-Object { $_.DisplayName -match 'Antigravity' } | Select-Object -First 1 DisplayName, DisplayVersion",
        expectedOutput: "Antigravity (User) 1.20.6",
        preSteps: [
          "下の確認コマンドを実行して、結果が出るか確認します。",
          "コマンドをコピーして PowerShell に貼り付ける"
        ],
        postSteps: [
          "Enter を押す",
          "DisplayName / DisplayVersion が表示されることを確認する"
        ],
        substeps: [
          "下の確認コマンドを実行して、結果が出るか確認します。",
          "コマンドをコピーして PowerShell に貼り付ける",
          "Enter を押す",
          "DisplayName / DisplayVersion が表示されることを確認する"
        ],
        choices: [
          { label: "インストール済み", next: "win_phase1_complete", summary: "Antigravity は導入済み" },
          { label: "未インストール", next: "win_install_antigravity", summary: "Antigravity をこれから導入" },
          { label: "結果が出ない", next: "win_install_antigravity", summary: "Antigravity の確認と導入へ" }
        ]
      },
      win_phase1_complete: {
        title: "Windows: Antigravity セットアップ完了",
        description: "ここまでで第1フェーズは達成です。",
        celebrate: true,
        choices: [
          { label: "次の工程（Claude Code準備）へ進む", next: "win_check_git", summary: "第2フェーズへ進行" }
        ]
      },
      win_install_antigravity: {
        title: "Windows: Antigravity を導入する",
        description: "公式ページを開いて Windows 版をインストールし、起動確認します。",
        command: "start https://antigravity.google/",
        choices: [
          { label: "導入と起動確認ができた", next: "win_check_antigravity", summary: "Antigravity の導入完了" }
        ]
      },
      win_check_git: {
        title: "Windows: Git の確認をする",
        description: "Gitのバージョン確認です。",
        command: "git --version",
        preSteps: [
          "下のコマンドをコピーして PowerShell に貼り付ける"
        ],
        postSteps: [
          "Enter を押す",
          "git version 2.x のような表示が出れば OK"
        ],
        substeps: [
          "下のコマンドをコピーして PowerShell に貼り付ける",
          "Enter を押す",
          "git version 2.x のような表示が出れば OK"
        ],
        expectedOutput: "git version 2.47.1.windows.1",
        choices: [
          { label: "表示された", next: "win_prepare_path", summary: "Git は利用可能" },
          { label: "表示されなかった", next: "win_install_git", summary: "Git の導入が必要" },
          { label: "わからないので次へ", next: "win_install_git", summary: "Git 導入手順へ進む" }
        ]
      },
      win_install_git: {
        title: "Windows: Git をインストールする",
        description: "インストール後、確認コマンドを再実行します。",
        command: "winget install -e --id Git.Git",
        choices: [
          { label: "インストールできた", next: "win_check_git", summary: "Git のインストール完了" },
          { label: "既に入っていたので次へ", next: "win_prepare_path", summary: "Git は既存のためスキップ" }
        ]
      },
      win_prepare_path: {
        title: "Windows: PATH 用フォルダを準備する",
        description: "PATH準備スクリプトを実行します。",
        command: "mkdir $env:USERPROFILE\\.local\\bin -Force\n\n$currentPath = [Environment]::GetEnvironmentVariable('PATH', 'User')\nif ($currentPath -notlike \"*$env:USERPROFILE\\.local\\bin*\") {\n  [Environment]::SetEnvironmentVariable(\n    'PATH',\n    \"$currentPath;$env:USERPROFILE\\.local\\bin\",\n    'User'\n  )\n}",
        preSteps: [
          "下のコマンドをコピーして PowerShell に貼り付ける"
        ],
        postSteps: [
          "Enter を押す",
          "$env:PATH -split ';' で .local\\bin が含まれるか確認する"
        ],
        substeps: [
          "下のコマンドをコピーして PowerShell に貼り付ける",
          "Enter を押す",
          "$env:PATH -split ';' で .local\\bin が含まれるか確認する"
        ],
        expectedOutput: "C:\\Users\\<あなたのユーザー名>\\.local\\bin",
        choices: [
          { label: "実行した", next: "win_restart_shell", summary: "PATH 設定を実行" },
          { label: "すでに設定済み", next: "win_restart_shell", summary: "PATH 設定をスキップ" }
        ]
      },
      win_restart_shell: {
        title: "Windows: PowerShell を開き直す",
        description: "PATH 反映のため、PowerShell を完全に閉じて開き直します。",
        command: "Win + R を押す\npowershell\nEnter",
        shellLabel: "開き直し手順",
        preSteps: [
          "今の PowerShell を閉じる"
        ],
        postSteps: [
          "Win + R で powershell と入力して Enter",
          "新しい PowerShell が開いたら次へ進む"
        ],
        substeps: [
          "今の PowerShell を閉じる",
          "Win + R で powershell と入力して Enter",
          "新しい PowerShell が開いたら次へ進む"
        ],
        choices: [
          { label: "開き直した", next: "win_check_node", summary: "PowerShell を再起動" }
        ]
      },
      win_check_node: {
        title: "Windows: Node.js の確認をする",
        description: "まず Node 本体の確認です。",
        command: "node --version",
        preSteps: [
          "下のコマンドをコピーして PowerShell に貼り付ける"
        ],
        postSteps: [
          "Enter を押す",
          "v18 以上が表示されることを確認する"
        ],
        substeps: [
          "下のコマンドをコピーして PowerShell に貼り付ける",
          "Enter を押す",
          "v18 以上が表示されることを確認する"
        ],
        expectedOutput: "v24.13.1",
        choices: [
          { label: "v18以上が表示された", next: "win_check_npm", summary: "Node.js は利用可能" },
          { label: "表示されなかった", next: "win_install_node", summary: "Node.js の導入が必要" },
          { label: "わからないので導入へ", next: "win_install_node", summary: "Node.js 導入手順へ進む" }
        ]
      },
      win_check_npm: {
        title: "Windows: npm の確認をする",
        description: "次に npm を確認します。",
        command: "npm --version",
        preSteps: [
          "下のコマンドをコピーして PowerShell に貼り付ける"
        ],
        postSteps: [
          "Enter を押す",
          "数字のバージョンが表示されることを確認する"
        ],
        substeps: [
          "下のコマンドをコピーして PowerShell に貼り付ける",
          "Enter を押す",
          "数字のバージョンが表示されることを確認する"
        ],
        expectedOutput: "10.9.2",
        choices: [
          { label: "表示された", next: "win_check_claude", summary: "npm は利用可能" },
          { label: "表示されなかった", next: "win_install_node", summary: "Node.js 再導入が必要" }
        ]
      },
      win_install_node: {
        title: "Windows: Node.js をインストールする",
        description: "インストール後に確認を実行します。",
        command: "winget install -e --id OpenJS.NodeJS",
        choices: [
          { label: "インストールできた", next: "win_check_node", summary: "Node.js のインストール完了" },
          { label: "既に入っていたので次へ", next: "win_check_npm", summary: "Node.js は既存のためスキップ" }

    const goalStepIds = [
      "win_open_terminal", "win_check_antigravity", "win_phase1_complete", "win_check_git", "win_prepare_path",
      "win_check_node", "win_check_npm", "win_check_claude", "win_make_workdir", "win_launch_claude", "win_first_message",
      "mac_open_terminal", "mac_check_antigravity", "mac_phase1_complete", "mac_check_brew", "mac_check_git", "mac_check_node",
      "mac_check_npm", "mac_check_claude", "mac_make_workdir", "mac_launch_claude", "mac_first_message"
    ];

    const state = {
      started: false,
      currentNodeId: null,
      history: [],
      substepProgress: {},
      flow: null,
      celebratedNodes: {}
    };

    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const tree = document.getElementById("tree");
    const status = document.getElementById("status");
    const finish = document.getElementById("finish");

    startBtn.addEventListener("click", () => {
      if (state.started) return;
      state.started = true;
      state.currentNodeId = "select_os";
      tree.style.display = "block";
      status.style.display = "block";
      render();
    });

    resetBtn.addEventListener("click", resetAll);

    function resetAll() {
      state.started = false;
      state.currentNodeId = null;
      state.history = [];
      state.substepProgress = {};
      state.flow = null;
      state.celebratedNodes = {};
      tree.innerHTML = "";
      tree.style.display = "none";
      finish.style.display = "none";
      status.style.display = "none";
      startBtn.disabled = false;
    }

    function render() {
      tree.innerHTML = "";

      if (!state.started || !state.currentNodeId) return;

      renderPhaseProgress();

      for (const entry of state.history) {
        tree.appendChild(renderHistoryNode(entry));
      }

      const current = nodes[state.currentNodeId];
      if (!current) return;

      if (state.currentNodeId === "done") {
        finish.style.display = "block";
        renderPhaseProgress(true);
        return;
      }

      finish.style.display = "none";
      tree.appendChild(renderActiveNode(state.currentNodeId, current));
    }

    function renderHistoryNode(entry) {
      const wrap = document.createElement("article");
      wrap.className = "node history-node";

      wrap.innerHTML = `
        <img class="history-pin" src="./assets/yes.png" alt="done">
        <div class="node-head">
          <img class="history-icon" src="./assets/yes.png" alt="done">
          <h3>${escapeHtml(nodes[entry.nodeId].title)}</h3>
        </div>
      `;
      return wrap;
    }

    function renderActiveNode(nodeId, node) {
      const wrap = document.createElement("article");
      wrap.className = "node active-node";

      const heading = document.createElement("div");
      heading.className = "node-head";
      heading.innerHTML = `<img class="history-icon" src="./assets/no.png" alt="todo"><h3>${escapeHtml(node.title)}</h3>`;
      wrap.appendChild(heading);

      if (!node.substeps || node.substeps.length === 0) {
        const p = document.createElement("p");
        p.textContent = node.description;
        wrap.appendChild(p);
      }

      if (node.celebrate) {
        wrap.appendChild(createCelebrateBand());
        if (!state.celebratedNodes[nodeId]) {
          triggerScreenBurst();
          state.celebratedNodes[nodeId] = true;
        }
      }

      if (node.substeps && node.substeps.length && node.preSteps && node.preSteps.length) {
        wrap.appendChild(renderSubsteps(nodeId, node, "pre"));
      }

      if (node.command) {
        const shellLabel = getShellLabel(nodeId, node);
        wrap.appendChild(createCodeCard(node.command, shellLabel));
      }

      if (node.substeps && node.substeps.length && node.postSteps && node.postSteps.length) {
        wrap.appendChild(renderSubsteps(nodeId, node, "post"));
      } else if (node.substeps && node.substeps.length && (!node.preSteps || !node.postSteps)) {
        wrap.appendChild(renderSubsteps(nodeId, node, "all"));
      }

      if (node.choices && node.choices.length) {
        const choices = document.createElement("div");
        choices.className = "choices";
        const substepsCompleted = isSubstepsCompleted(nodeId, node);
        node.choices.forEach(choice => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "choice-btn";
          b.textContent = choice.label;
          if (node.substeps && !substepsCompleted) {
            b.disabled = true;
            b.style.opacity = "0.45";
            b.title = "先にこの工程内のチェックを完了してください";
          }
          b.addEventListener("click", () => {
            if (choice.flow) state.flow = choice.flow;
            state.history.push({
              nodeId,
              summary: choice.summary || `${choice.label} を選択`
            });
            state.currentNodeId = choice.next;
            render();
          });
          choices.appendChild(b);
        });
        wrap.appendChild(choices);
      } else {
        const done = document.createElement("span");
        done.className = "complete";
        done.textContent = "このノードは分岐なし";
        wrap.appendChild(done);
      }

      return wrap;
    }

    function renderPhaseProgress(forceComplete = false) {
      const flow = state.flow || (state.history.some(item => item.summary.includes("Macルート")) ? "mac" : "win");
      const phase1Nodes = flow === "mac"
        ? ["mac_open_terminal", "mac_check_antigravity", "mac_phase1_complete"]
        : ["win_open_terminal", "win_check_antigravity", "win_phase1_complete"];
      const phase1CompleteId = flow === "mac" ? "mac_phase1_complete" : "win_phase1_complete";
      const phase2Nodes = flow === "mac"
        ? ["mac_check_brew", "mac_check_git", "mac_check_node", "mac_check_npm", "mac_check_claude", "mac_make_workdir", "mac_launch_claude", "mac_first_message"]
        : ["win_check_git", "win_prepare_path", "win_restart_shell", "win_check_node", "win_check_npm", "win_check_claude", "win_make_workdir", "win_launch_claude", "win_first_message"];

      const doneSet = new Set(state.history.map(h => h.nodeId));
      const p1Done = forceComplete ? phase1Nodes.length : phase1Nodes.filter(id => doneSet.has(id)).length;
      const p2Done = forceComplete ? phase2Nodes.length : phase2Nodes.filter(id => doneSet.has(id)).length;
      const p1Rate = Math.max(0, Math.min(100, (p1Done / phase1Nodes.length) * 100));
      const p2Rate = Math.max(0, Math.min(100, (p2Done / phase2Nodes.length) * 100));
      const showPhase2 = forceComplete || (doneSet.has(phase1CompleteId) && state.currentNodeId !== phase1CompleteId);

      status.innerHTML = `
        <div class="phase-bars">
          <div class="phase-goal">ゴール: Antigravityをインストールしたら達成</div>
          <div class="phase-row">
            <div class="phase-dot"><img src="${p1Rate >= 100 ? "./assets/yes.png" : "./assets/no.png"}" alt="phase1"></div>
            <div class="phase-bar">
              <div class="phase-fill" style="width:${p1Rate}%;"></div>
              <div class="walker" style="left:${Math.max(3, p1Rate)}%;">
                <dotlottie-player src="./assets/Boy Walking.lottie" background="transparent" speed="1" loop autoplay></dotlottie-player>
              </div>
            </div>
          </div>
          <div class="phase-row" style="${showPhase2 ? "" : "display:none;"}">
            <div class="phase-dot"><img src="${p2Rate >= 100 ? "./assets/yes.png" : "./assets/no.png"}" alt="phase2"></div>
            <div class="phase-bar">
              <div class="phase-fill" style="width:${p2Rate}%;"></div>
              <div class="walker" style="left:${Math.max(3, p2Rate)}%;">
                <dotlottie-player src="./assets/Boy Walking.lottie" background="transparent" speed="1" loop autoplay></dotlottie-player>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function getShellLabel(nodeId, node) {
      if (node.shellLabel) return { text: node.shellLabel, icon: null, kind: "plain" };
      if (nodeId.startsWith("mac_")) return { text: "Terminal", icon: "./assets/Terminal.png", kind: "terminal" };
      if (nodeId.startsWith("win_")) return { text: "Powershell", icon: "./assets/Powershell.png", kind: "powershell" };
      return { text: "コマンド", icon: null, kind: "plain" };
    }

    function getSubstepState(nodeId, node) {
      if (!state.substepProgress[nodeId]) {
        state.substepProgress[nodeId] = node.substeps.map(() => false);
      }
      return state.substepProgress[nodeId];
    }

    function isSubstepsCompleted(nodeId, node) {
      if (!node.substeps || node.substeps.length === 0) return true;
      const progress = getSubstepState(nodeId, node);
      return progress.every(Boolean);
    }

    function updateSubstep(nodeId, node, index) {
      const progress = getSubstepState(nodeId, node).slice();
      const firstIncomplete = progress.findIndex(done => !done);
      const isDone = progress[index];

      if (isDone) {
        for (let i = index; i < progress.length; i += 1) {
          progress[i] = false;
        }
      } else if (index === firstIncomplete) {
        progress[index] = true;
      }

      state.substepProgress[nodeId] = progress;
      render();
    }

    function renderSubsteps(nodeId, node, mode = "all") {
      const wrap = document.createElement("section");
      wrap.className = "substeps";

      const progress = getSubstepState(nodeId, node);
      const firstIncomplete = progress.findIndex(done => !done);
      let indices = node.substeps.map((_v, idx) => idx);
      if (mode === "pre" && node.preSteps) {
        indices = node.preSteps.map((_, idx) => idx);
      }
      if (mode === "post" && node.postSteps) {
        const start = (node.preSteps || []).length;
        indices = node.postSteps.map((_, idx) => idx + start);
      }

      indices.forEach((idx) => {
        const label = getSubstepLabel(node, idx);
        const row = document.createElement("div");
        row.className = "substep-row";

        const done = progress[idx];
        const isCurrent = idx === firstIncomplete || (firstIncomplete === -1 && idx === progress.length - 1);
        if (done) row.classList.add("done");
        if (isCurrent && !done) row.classList.add("current");

        const button = document.createElement("button");
        button.type = "button";
        button.className = "substep-toggle";
        button.setAttribute("aria-label", `${label} をチェック`);
        const clickable = done || idx === firstIncomplete;
        button.disabled = !clickable;
        button.addEventListener("click", () => updateSubstep(nodeId, node, idx));

        const icon = document.createElement("img");
        icon.src = done ? "./assets/yes.png" : "./assets/no.png";
        icon.alt = done ? "完了" : "未完了";
        button.appendChild(icon);

        const text = document.createElement("span");
        text.className = "substep-text";
        text.textContent = label;

        row.appendChild(button);
        row.appendChild(text);
        wrap.appendChild(row);
      });

      return wrap;
    }

    function getSubstepLabel(node, idx) {
      const base = node.substeps[idx];
      if (!node.expectedOutput || idx !== node.substeps.length - 1) return base;
      return `${base} 表示例 [${node.expectedOutput}]`;
    }

    function createCelebrateBand() {
      const wrap = document.createElement("div");
      wrap.className = "celebrate";
      const colors = ["#4ecb88", "#7edcaa", "#2b9983", "#f4c95d", "#7fa4ff"];
      for (let i = 0; i < 18; i += 1) {
        const c = document.createElement("span");
        c.className = "confetti";
        c.style.left = `${Math.floor(Math.random() * 100)}%`;
        c.style.background = colors[i % colors.length];
        c.style.animationDelay = `${(i % 6) * 50}ms`;
        wrap.appendChild(c);
      }
      return wrap;
    }

    function createCodeCard(command, shellMeta = { text: "コマンド", icon: null, kind: "plain" }) {
      const card = document.createElement("section");
      card.className = "ps-card";

      const top = document.createElement("div");
      top.className = "ps-top";
      const shellTag = document.createElement("span");
      shellTag.className = "shell-tag";
      if (shellMeta.icon) {
        const icon = document.createElement("img");
        icon.src = shellMeta.icon;
        icon.alt = shellMeta.text;
        shellTag.appendChild(icon);
      }
      const text = document.createElement("span");
      text.textContent = shellMeta.text;
      if (shellMeta.kind === "powershell") text.className = "shell-blue";
      shellTag.appendChild(text);
      top.appendChild(shellTag);

      const copy = document.createElement("button");
      copy.type = "button";
      copy.className = "copy-btn";
      copy.textContent = "コピー";
      copy.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(command);
          copy.textContent = "コピーしました";
          maybeShowPasteWarning(top, shellMeta);
          setTimeout(() => { copy.textContent = "コピー"; }, 1500);
        } catch (_e) {
          copy.textContent = "コピー失敗";
          setTimeout(() => { copy.textContent = "コピー"; }, 1500);
        }
      });

      top.appendChild(copy);
      card.appendChild(top);

      const pre = document.createElement("pre");
      pre.textContent = command;
      card.appendChild(pre);

      return card;
    }

    function maybeShowPasteWarning(host, shellMeta) {
      const hide = localStorage.getItem("hidePasteWarning") === "1";
      const isPasteFlow = shellMeta.kind === "powershell" || shellMeta.kind === "terminal";
      if (hide || !isPasteFlow) return;

      const old = host.querySelector(".copy-tip");
      if (old) old.remove();

      const tip = document.createElement("div");
      tip.className = "copy-tip";
      tip.innerHTML = `
        <div class="copy-tip-head"><img src="./assets/warning.png" alt="warning"><span>貼り付け時の確認</span></div>
        <div>警告が出る場合がありますが、この手順では想定内です。続行して問題ありません。</div>
      `;
      const hideBtn = document.createElement("button");
      hideBtn.type = "button";
      hideBtn.className = "copy-tip-hide";
      hideBtn.textContent = "次から表示しない";
      hideBtn.addEventListener("click", () => {
        localStorage.setItem("hidePasteWarning", "1");
        tip.remove();
      });
      tip.appendChild(hideBtn);
      host.appendChild(tip);
      setTimeout(() => tip.remove(), 5000);
    }

    function triggerScreenBurst() {
      const layer = document.createElement("div");
      layer.className = "screen-burst";
      const colors = ["#4ecb88", "#7edcaa", "#2b9983", "#f4c95d", "#7fa4ff"];
      for (let i = 0; i < 52; i += 1) {
        const c = document.createElement("span");
        c.className = "confetti";
        c.style.left = `${Math.floor(Math.random() * 100)}%`;
        c.style.top = `${Math.floor(Math.random() * 22)}%`;
        c.style.background = colors[i % colors.length];
        c.style.animationDelay = `${(i % 10) * 40}ms`;
        layer.appendChild(c);
      }
      document.body.appendChild(layer);
      setTimeout(() => layer.remove(), 1300);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
