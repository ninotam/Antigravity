<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Code セットアップナビ</title>
  <style>
    :root {
      --bg: #eceff1;
      --panel: #f7f8f9;
      --ink: #15202b;
      --muted: #506170;
      --line: #cad2da;
      --accent: #1d7b72;
      --accent-ink: #ffffff;
      --card-bg: #2b2f34;
      --card-line: #454c56;
      --card-ink: #f3f4f6;
      --card-muted: #c9ced6;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "BIZ UDPGothic", "Yu Gothic UI", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1000px 400px at 10% -10%, #ffffff 0%, transparent 65%),
        radial-gradient(700px 350px at 100% 0%, #e3eaee 0%, transparent 70%),
        var(--bg);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }

    .hero {
      background: linear-gradient(165deg, #f7f9fa 0%, #eef2f4 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 28px rgba(16, 24, 40, 0.05);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      transition: padding 260ms ease, border-radius 260ms ease, box-shadow 260ms ease, margin-bottom 260ms ease;
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3.4vw, 2rem);
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.97rem;
      max-width: 62%;
      transition: opacity 220ms ease, max-height 220ms ease, margin 220ms ease;
      max-height: 80px;
      overflow: hidden;
    }

    .start-wrap { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .hero-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 14px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #c9d6df;
      background: #f3f7fa;
      color: #304453;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.76rem;
      font-weight: 700;
    }

    .hero-media {
      position: absolute;
      right: 4px;
      top: -8px;
      width: 290px;
      height: 290px;
      overflow: hidden;
      pointer-events: none;
      transition: width 260ms ease, height 260ms ease, top 260ms ease, right 260ms ease, opacity 260ms ease;
    }

    .hero-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .btn-main {
      background: var(--accent);
      color: var(--accent-ink);
      box-shadow: 0 8px 20px rgba(29, 123, 114, 0.28);
    }

    .btn-secondary {
      background: #e5eaef;
      color: #1e2a35;
      border: 1px solid #c9d2da;
    }

    .app-started .hero {
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(16, 24, 40, 0.06);
    }

    .app-started .lead {
      opacity: 0;
      max-height: 0;
      margin: 0;
    }

    .app-started .hero-badges {
      display: none;
    }

    .app-started .hero-media {
      width: 118px;
      height: 118px;
      top: -18px;
      right: -6px;
      opacity: 0.88;
    }

    .status {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      color: #344453;
      margin-bottom: 16px;
      display: none;
      font-size: 0.93rem;
    }

    .phase-bars {
      display: grid;
      gap: 8px;
    }

    .phase-goal {
      font-size: 0.82rem;
      color: #345063;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .phase-row {
      display: block;
    }

    .phase-bar {
      position: relative;
      height: 10px;
      border-radius: 999px;
      background: #dfe6ec;
      overflow: hidden;
      border: 1px solid #c9d3dc;
    }

    .phase-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, #1d7b72 0%, #48b093 100%);
      transition: width 280ms ease;
    }

    .walker {
      position: absolute;
      bottom: 6px;
      width: 34px;
      height: 34px;
      transform: translateX(-50%);
      pointer-events: none;
      transition: left 280ms ease;
      z-index: 2;
      display: grid;
      place-items: center;
    }

    .walker video {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
    }

    .tree {
      position: relative;
      margin-left: 16px;
      padding-left: 24px;
      border-left: 2px dashed #bfc9d2;
      display: none;
    }

    .node {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin: 0 0 16px;
      animation: fadeIn 220ms ease;
      isolation: isolate;
      transition: transform 220ms ease, opacity 220ms ease, padding 220ms ease, box-shadow 220ms ease;
    }

    .node::before {
      content: "";
      position: absolute;
      width: 16px;
      border-top: 2px dashed #bfc9d2;
      left: -24px;
      top: 26px;
    }

    .node.active-node {
      border-color: #3fc772;
      box-shadow: 0 0 0 2px rgba(63, 199, 114, 0.22), 0 12px 30px rgba(29, 64, 46, 0.12);
      transform: scale(1.01);
      padding: 16px;
    }

    .node.history-node {
      opacity: 0.46;
      max-width: 56%;
      padding: 7px 8px;
      margin-left: 8px;
    }

    .node.history-node h3 {
      font-size: 0.6rem;
      color: #5f6f7e;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .history-badge {
      width: 12px;
      height: 12px;
      display: inline-block;
      margin-right: 0;
      vertical-align: baseline;
      opacity: 0.9;
    }

    .node.history-node .done-summary {
      font-size: 0.58rem;
      color: #718291;
    }

    .node-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .node h3 {
      margin: 0;
      font-size: 1.03rem;
      line-height: 1.35;
    }

    .badge {
      font-size: 0.8rem;
      color: #0f5f46;
      background: #d6f0e7;
      border: 1px solid #a4d9c7;
      border-radius: 999px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    .node p {
      margin: 0 0 10px;
      color: #3d4f5f;
      font-size: 0.93rem;
    }

    .node.active-node p {
      color: #1c3348;
      font-weight: 700;
    }

    .choices {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .choice-btn {
      background: #edf2f6;
      border: 1px solid #c8d3dd;
      color: #20303f;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .choice-btn.choice-positive {
      background: #e8f2ff;
      border-color: #86b6ff;
      color: #163a75;
      box-shadow: 0 0 0 1px rgba(76, 134, 240, 0.36), 0 0 10px rgba(76, 134, 240, 0.28);
    }

    .choice-content {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .choice-icon {
      width: 18px;
      height: 18px;
      object-fit: contain;
      display: block;
    }

    .os-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .os-title img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: inline-block;
      vertical-align: middle;
    }

    .done-summary {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #485b6c;
      border-top: 1px dashed #ccd4dc;
      padding-top: 8px;
    }

    .substeps {
      margin-top: 10px;
      padding: 0;
      display: grid;
      gap: 14px;
    }

    .substep-row {
      display: block;
      padding: 0 2px;
      transition: opacity 150ms ease, transform 150ms ease;
      opacity: 0.42;
    }

    .substep-row.current {
      opacity: 1;
      transform: scale(1.01);
    }

    .substep-row.done {
      opacity: 1;
    }

    .substep-text {
      font-size: 0.9rem;
      color: #687888;
      font-weight: 600;
      transition: color 140ms ease, font-size 140ms ease, transform 140ms ease, opacity 140ms ease;
      border: 1px solid #ced8e2;
      border-radius: 8px;
      background: #f4f7fa;
      padding: 10px 12px 10px 44px;
      flex: 1;
      line-height: 1.72;
      position: relative;
    }

    .substep-dot {
      width: 20px;
      height: 20px;
      object-fit: contain;
      margin-top: 0;
      opacity: 0.94;
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .example-chip {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      padding: 3px 9px;
      border-radius: 8px;
      border: 1px solid #c8d2dc;
      background: #e6ebf0;
      color: #2a3b4b;
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.2;
      vertical-align: middle;
    }

    .substep-row.current .substep-text {
      color: #13352d;
      font-weight: 800;
      font-size: 1rem;
      border-color: #a7cfb9;
      background: #eaf8ef;
    }

    .substep-row.done .substep-text {
      color: #1f4c3f;
      font-size: 0.94rem;
      font-weight: 700;
      opacity: 1;
      border-color: #a7cfb9;
      background: #eaf8ef;
    }

    .ps-card {
      border: 1px solid var(--card-line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--card-bg);
      margin: 8px 0 6px;
    }

    .ps-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #343940;
      border-bottom: 1px solid var(--card-line);
      color: var(--card-muted);
      font-size: 0.82rem;
      font-weight: 700;
      position: relative;
    }

    .shell-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .shell-tag img {
      width: 14px;
      height: 14px;
      display: block;
    }

    .shell-tag .shell-blue {
      color: #6fb8ff;
      font-weight: 800;
    }

    .copy-btn {
      border: 1px solid #606b79;
      background: #3f4650;
      color: var(--card-ink);
      font-size: 0.78rem;
      padding: 6px 9px;
      border-radius: 9px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .copy-btn video {
      width: 66px;
      height: 66px;
      object-fit: contain;
      display: block;
    }

    .copy-tip {
      position: fixed;
      top: 16px;
      left: 16px;
      max-width: 290px;
      background: #f6fbf9;
      border: 1px solid #b9d9cb;
      border-radius: 10px;
      color: #26483c;
      box-shadow: 0 8px 24px rgba(17, 42, 32, 0.15);
      padding: 8px 9px;
      font-size: 0.78rem;
      line-height: 1.4;
      z-index: 10;
      animation: fadeIn 120ms ease;
    }

    .copy-tip-head {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .copy-tip-head img {
      width: 13px;
      height: 13px;
    }

    .inline-shell {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      vertical-align: middle;
      margin: 0 2px;
    }

    .inline-shell img {
      width: 14px;
      height: 14px;
      object-fit: contain;
      display: block;
    }

    .inline-shell .shell-blue {
      color: #5caeff;
      font-weight: 800;
    }

    .copy-tip-hide {
      margin-top: 6px;
      border: 1px solid #b6c6cf;
      background: #eef3f6;
      color: #2b3d4b;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 7px;
      cursor: pointer;
    }

    pre {
      margin: 0;
      padding: 12px;
      color: var(--card-ink);
      overflow-x: auto;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.9rem;
      line-height: 1.55;
      background: var(--card-bg);
      white-space: pre;
    }

    .complete {
      display: inline-block;
      margin-top: 8px;
      background: #dceee8;
      border: 1px solid #b0d8cb;
      color: #145849;
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.86rem;
    }

    .finish {
      border: 1px solid #b8d4c8;
      background: #eef9f4;
      color: #144e40;
      border-radius: 14px;
      padding: 16px;
      margin-top: 10px;
      display: none;
    }

    .loading-card {
      border: 1px solid #c8d5df;
      border-radius: 14px;
      background: #f4f8fb;
      min-height: 220px;
      display: grid;
      place-items: center;
      margin: 0 0 16px;
      animation: fadeIn 180ms ease;
    }

    .loading-card video {
      width: 140px;
      height: 140px;
      object-fit: contain;
      display: block;
      opacity: 0.95;
    }

    .celebrate {
      margin-top: 10px;
      position: relative;
      height: 8px;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: burst 1500ms ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .active-node > * {
      opacity: 0;
      animation: textIn 320ms ease forwards;
    }

    .active-node > *:nth-child(1) { animation-delay: 40ms; }
    .active-node > *:nth-child(2) { animation-delay: 110ms; }
    .active-node > *:nth-child(3) { animation-delay: 180ms; }
    .active-node > *:nth-child(4) { animation-delay: 250ms; }
    .active-node > *:nth-child(5) { animation-delay: 320ms; }
    .active-node > *:nth-child(6) { animation-delay: 390ms; }
    .active-node > *:nth-child(7) { animation-delay: 460ms; }
    .active-node > *:nth-child(8) { animation-delay: 530ms; }
    }

    @keyframes burst {
      0% { transform: translateY(-18px) rotate(0deg); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    .screen-burst {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .screen-burst::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(14, 22, 30, 0.28);
      animation: burst-dim 1500ms ease forwards;
    }

    @keyframes burst-dim {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }


    @media (max-width: 640px) {
      .container { padding: 16px 12px 40px; }
      .hero { padding: 18px; border-radius: 14px; }
      .lead { max-width: 100%; }
      .hero-media {
        position: static;
        width: 100%;
        height: 220px;
        margin-top: 12px;
      }
      .tree { margin-left: 6px; padding-left: 16px; }
      .node::before { width: 10px; left: -16px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1 class="title">Claude Code Setupナビ</h1>
      <p class="lead">最初に見えるのは次の1手だけ。完了チェックで一歩ずつ進めて、「最初の一言」まで到達します。</p>
      <div class="hero-badges">
        <span class="hero-badge">分岐ガイド</span>
        <span class="hero-badge">Windows / Mac 対応</span>
        <span class="hero-badge">コピーボタン付き手順</span>
      </div>
      <div class="start-wrap">
        <button id="startBtn" class="btn-main">まずは始める</button>
        <button id="resetBtn" class="btn-secondary" type="button">最初からやり直す</button>
      </div>
      <div class="hero-media">
        <video src="./assets/bear.webm" autoplay muted loop playsinline></video>
      </div>
    </section>

    <div id="status" class="status"></div>
    <section id="tree" class="tree" aria-live="polite"></section>
    <section id="finish" class="finish">
      <strong>セットアップ完了</strong>
      <p>最初の一言を送り、返事を受け取るところまで到達できました。</p>
    </section>
  </main>

  <script>
    const nodes = {
      select_os: {
        title: "使っているOSを選んでください",
        description: "ここで選ぶと、そのOS向けの手順だけ表示します。",
        choices: [
          { label: "Windowsで進める", icon: "windows", next: "win_open_terminal", summary: "Windowsルートを選択", flow: "win" },
          { label: "Macで進める", icon: "mac", next: "mac_open_terminal", summary: "Macルートを選択", flow: "mac" }
        ]
      },

      win_open_terminal: {
        title: "Windows: まず PowerShell を開く",
        description: "Windowsキー + R を押して、下の文字を貼り付けて Enter を押します。",
        command: "powershell",
        shellLabel: "Win + R に入力",
        choices: [
          { label: "PowerShell を開けた", next: "win_check_antigravity", summary: "PowerShell を起動" }
        ]
      },

      win_check_antigravity: {
        title: "Windows: Antigravity のインストール確認",
        description: "下の確認コマンドを実行して、結果が出るか確認します。",
        command: "$apps = @()\n$apps += Get-ItemProperty HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\* -ErrorAction SilentlyContinue\n$apps += Get-ItemProperty HKLM:\\Software\\WOW6432Node\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\* -ErrorAction SilentlyContinue\n$apps += Get-ItemProperty HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\* -ErrorAction SilentlyContinue\n$apps | Where-Object { $_.DisplayName -match 'Antigravity' } | Select-Object -First 1 DisplayName, DisplayVersion",
        expectedOutput: "Antigravity (User) 1.20.6",
        preSteps: [
          "下の確認コマンドを実行して、結果が出るか確認します。",
          "コマンドをコピーして PowerShell に貼り付ける"
        ],
        postSteps: [
          "Enter を押す",
          "DisplayName / DisplayVersion が表示されることを確認する"
        ],
        substeps: [
          "下の確認コマンドを実行して、結果が出るか確認します。",
          "コマンドをコピーして PowerShell に貼り付ける",
          "Enter を押す",
          "DisplayName / DisplayVersion が表示されることを確認する"
        ],
        choices: [
          { label: "インストール済み", next: "win_phase1_complete", summary: "Antigravity は導入済み" },
          { label: "未インストール", next: "win_install_antigravity", summary: "Antigravity をこれから導入" },
          { label: "結果が出ない", next: "win_install_antigravity", summary: "Antigravity の確認と導入へ" }
        ]
      },
      win_phase1_complete: {
        title: "Windows: Antigravity セットアップ完了",
        description: "ここまでで第1フェーズは達成です。",
        celebrate: true,
        choices: [
          { label: "次の工程（Claude Code準備）へ進む", next: "win_check_git", summary: "第2フェーズへ進行" }
        ]
      },
      win_install_antigravity: {
        title: "Windows: Antigravity を導入する",
        description: "公式ページを開いて Windows 版をインストールし、起動確認します。",
        command: "start https://antigravity.google/",
        choices: [
          { label: "導入と起動確認ができた", next: "win_check_antigravity", summary: "Antigravity の導入完了" }
        ]
      },
      win_check_git: {
        title: "Windows: Git の確認をする",
        description: "Gitのバージョン確認です。",
        command: "git --version",
        preSteps: [
          "下のコマンドをコピーして PowerShell に貼り付ける"
        ],
        postSteps: [
          "Enter を押す",
          "git version 2.x のような表示が出れば OK"
        ],
        substeps: [
          "下のコマンドをコピーして PowerShell に貼り付ける",
          "Enter を押す",
          "git version 2.x のような表示が出れば OK"
        ],
        expectedOutput: "git version 2.47.1.windows.1",
        choices: [
          { label: "表示された", next: "win_prepare_path", summary: "Git は利用可能" },
          { label: "表示されなかった", next: "win_install_git", summary: "Git の導入が必要" },
          { label: "わからないので次へ", next: "win_install_git", summary: "Git 導入手順へ進む" }
        ]
      },
      win_install_git: {

    const goalStepIds = [
      "win_open_terminal", "win_check_antigravity", "win_phase1_complete", "win_check_git", "win_prepare_path",
      "win_check_node", "win_check_npm", "win_check_claude", "win_make_workdir", "win_launch_claude", "win_first_message",
      "mac_open_terminal", "mac_check_antigravity", "mac_phase1_complete", "mac_check_brew", "mac_check_git", "mac_check_node",
      "mac_check_npm", "mac_check_claude", "mac_make_workdir", "mac_launch_claude", "mac_first_message"
    ];

    const state = {
      started: false,
      currentNodeId: null,
      history: [],
      flow: null,
      celebratedNodes: {},
      isLoading: false,
      pendingNext: null,
      typeTimers: []
    };

    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const tree = document.getElementById("tree");
    const status = document.getElementById("status");
    const finish = document.getElementById("finish");

    startBtn.addEventListener("click", () => {
      if (state.started) return;
      state.started = true;
      state.currentNodeId = "select_os";
      document.body.classList.add("app-started");
      tree.style.display = "block";
      status.style.display = "block";
      render();
    });

    resetBtn.addEventListener("click", resetAll);

    function resetAll() {
      clearTypeTimers();
      state.started = false;
      state.currentNodeId = null;
      state.history = [];
      state.flow = null;
      state.celebratedNodes = {};
      state.isLoading = false;
      state.pendingNext = null;
      state.typeTimers = [];
      document.body.classList.remove("app-started");
      tree.innerHTML = "";
      tree.style.display = "none";
      finish.style.display = "none";
      status.style.display = "none";
      startBtn.disabled = false;
    }

    function render() {
      clearTypeTimers();
      tree.innerHTML = "";

      if (!state.started || !state.currentNodeId) return;

      renderPhaseProgress();

      for (const entry of state.history) {
        tree.appendChild(renderHistoryNode(entry));
      }

      if (state.isLoading) {
        const loading = document.createElement("section");
        loading.className = "loading-card";
        loading.innerHTML = `<video src="./assets/loading.webm" autoplay muted loop playsinline></video>`;
        tree.appendChild(loading);
        return;
      }

      const current = nodes[state.currentNodeId];
      if (!current) return;

      if (state.currentNodeId === "done") {
        finish.style.display = "block";
        renderPhaseProgress(true);
        return;
      }

      finish.style.display = "none";
      tree.appendChild(renderActiveNode(state.currentNodeId, current));
    }

    function renderHistoryNode(entry) {
      const wrap = document.createElement("article");
      wrap.className = "node history-node";

      wrap.innerHTML = `
        <div class="node-head">
          <h3><img class="history-badge" src="./assets/yes.png" alt="done">${formatNodeTitle(nodes[entry.nodeId].title)}</h3>
        </div>
      `;
      return wrap;
    }

    function renderActiveNode(nodeId, node) {
      const wrap = document.createElement("article");
      wrap.className = "node active-node";

      const heading = document.createElement("div");
      heading.className = "node-head";
      heading.innerHTML = `<h3>${formatNodeTitle(node.title)}</h3>`;
      wrap.appendChild(heading);

      if (!node.substeps || node.substeps.length === 0) {
        const p = document.createElement("p");
        p.className = "node-desc-text";
        p.innerHTML = formatInstructionText(node.description);
        wrap.appendChild(p);
      }

      if (node.celebrate) {
        wrap.appendChild(createCelebrateBand());
        if (!state.celebratedNodes[nodeId]) {
          triggerScreenBurst();
          state.celebratedNodes[nodeId] = true;
        }
      }

      if (node.substeps && node.substeps.length && node.preSteps && node.preSteps.length) {
        wrap.appendChild(renderSubsteps(nodeId, node, "pre"));
      }

      if (node.command) {
        const shellLabel = getShellLabel(nodeId, node);
        wrap.appendChild(createCodeCard(node.command, shellLabel));
      }

      if (node.substeps && node.substeps.length && node.postSteps && node.postSteps.length) {
        wrap.appendChild(renderSubsteps(nodeId, node, "post"));
      } else if (node.substeps && node.substeps.length && (!node.preSteps || !node.postSteps)) {
        wrap.appendChild(renderSubsteps(nodeId, node, "all"));
      }

      if (node.choices && node.choices.length) {
        const choices = document.createElement("div");
        choices.className = "choices";
        node.choices.forEach((choice, idx) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "choice-btn";
          if (nodeId !== "select_os" && idx === 0) {
            b.classList.add("choice-positive");
          }
          b.innerHTML = getChoiceHtml(choice);
          b.addEventListener("click", () => {
            if (choice.flow) state.flow = choice.flow;
            state.history.push({
              nodeId,
              summary: choice.summary || `${choice.label} を選択`
            });
            const nextNode = nodes[choice.next];
            const skipLoading = !!(nextNode && nextNode.celebrate);
            state.pendingNext = choice.next;

            if (skipLoading) {
              state.currentNodeId = state.pendingNext;
              state.pendingNext = null;
              state.isLoading = false;
              render();
              return;
            }

            state.isLoading = true;
            render();
            setTimeout(() => {
              state.currentNodeId = state.pendingNext;
              state.pendingNext = null;
              state.isLoading = false;
              render();
            }, 750);
          });
          choices.appendChild(b);
        });
        wrap.appendChild(choices);
      } else {
        const done = document.createElement("span");
        done.className = "complete";
        done.textContent = "このノードは分岐なし";
        wrap.appendChild(done);
      }

      runTypewriter(wrap);

      return wrap;
    }

    function renderPhaseProgress(forceComplete = false) {
      const flow = state.flow || (state.history.some(item => item.summary.includes("Macルート")) ? "mac" : "win");
      const phase1Nodes = flow === "mac"
        ? ["mac_open_terminal", "mac_check_antigravity", "mac_phase1_complete"]
        : ["win_open_terminal", "win_check_antigravity", "win_phase1_complete"];
      const phase1CompleteId = flow === "mac" ? "mac_phase1_complete" : "win_phase1_complete";
      const phase2Nodes = flow === "mac"
        ? ["mac_check_brew", "mac_check_git", "mac_check_node", "mac_check_npm", "mac_check_claude", "mac_make_workdir", "mac_launch_claude", "mac_first_message"]
        : ["win_check_git", "win_prepare_path", "win_restart_shell", "win_check_node", "win_check_npm", "win_check_claude", "win_make_workdir", "win_launch_claude", "win_first_message"];

      const doneSet = new Set(state.history.map(h => h.nodeId));
      if (state.currentNodeId) doneSet.add(state.currentNodeId);
      const p1Done = forceComplete ? phase1Nodes.length : phase1Nodes.filter(id => doneSet.has(id)).length;
      const p2Done = forceComplete ? phase2Nodes.length : phase2Nodes.filter(id => doneSet.has(id)).length;
      const p1Rate = Math.max(0, Math.min(100, (p1Done / phase1Nodes.length) * 100));
      const p2Rate = Math.max(0, Math.min(100, (p2Done / phase2Nodes.length) * 100));
      const showPhase2 = forceComplete || (doneSet.has(phase1CompleteId) && state.currentNodeId !== phase1CompleteId);
      const activeRate = showPhase2 ? p2Rate : p1Rate;
      const goalText = showPhase2 ? "ゴール: Claude Codeをインストールしたら達成" : "ゴール: Antigravityをインストールしたら達成";

      status.innerHTML = `
        <div class="phase-bars">
          <div class="phase-goal">${goalText}</div>
          <div class="phase-row">
            <div class="phase-bar">
              <div class="phase-fill" style="width:${activeRate}%;"></div>
              <div class="walker" style="left:${Math.max(3, activeRate)}%;">
                <video src="./assets/walker.webm" autoplay muted loop playsinline></video>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function getShellLabel(nodeId, node) {
      if (node.shellLabel) return { text: node.shellLabel, icon: null, kind: "plain" };
      if (nodeId.startsWith("mac_")) return { text: "Terminal", icon: "./assets/Terminal.png", kind: "terminal" };
      if (nodeId.startsWith("win_")) return { text: "PowerShell", icon: "./assets/Powershell.png", kind: "powershell" };
      return { text: "コマンド", icon: null, kind: "plain" };
    }

    function getChoiceHtml(choice) {
      const label = escapeHtml(choice.label || "");
      if (!choice.icon) return label;
      const iconPath = choice.icon === "windows" ? "./assets/windows.png" : "./assets/mac.png";
      const alt = choice.icon === "windows" ? "Windows" : "Mac";
      return `<span class="choice-content"><img class="choice-icon" src="${iconPath}" alt="${alt}"><span>${label}</span></span>`;
    }

    function formatNodeTitle(title) {
      const raw = title || "";
      if (raw.startsWith("Windows:")) {
        const rest = escapeHtml(raw.replace(/^Windows:\s*/, ""));
        return `<span class="os-title"><img src="./assets/windows.png" alt="Windows"><span>${rest}</span></span>`;
      }
      if (raw.startsWith("Mac:")) {
        const rest = escapeHtml(raw.replace(/^Mac:\s*/, ""));
        return `<span class="os-title"><img src="./assets/mac.png" alt="Mac"><span>${rest}</span></span>`;
      }
      return escapeHtml(raw);
    }

    function renderSubsteps(nodeId, node, mode = "all") {
      const wrap = document.createElement("section");
      wrap.className = "substeps";

      let indices = node.substeps.map((_v, idx) => idx);
      if (mode === "pre" && node.preSteps) {
        indices = node.preSteps.map((_, idx) => idx);
      }
      if (mode === "post" && node.postSteps) {
        const start = (node.preSteps || []).length;
        indices = node.postSteps.map((_, idx) => idx + start);
      }

      indices.forEach((idx) => {
        const label = getSubstepLabel(node, idx);
        const row = document.createElement("div");
        row.className = "substep-row";
        if (idx === indices[0]) row.classList.add("current");
        if (idx !== indices[0]) row.classList.add("done");

        const dot = document.createElement("video");
        dot.className = "substep-dot";
        dot.src = "./assets/dot_loader.webm";
        dot.autoplay = true;
        dot.loop = true;
        dot.muted = true;
        dot.playsInline = true;

        const text = document.createElement("span");
        text.className = "substep-text";
        const main = document.createElement("span");
        main.className = "substep-main";
        if (typeof label === "string") {
          main.textContent = normalizeSubstepText(label);
          text.appendChild(main);
        } else {
          main.textContent = normalizeSubstepText(label.text);
          text.appendChild(main);
          if (label.example) {
            const chip = document.createElement("span");
            chip.className = "example-chip";
            chip.textContent = `表示例 [${label.example}]`;
            text.appendChild(chip);
          }
        }

        row.appendChild(text);
        text.appendChild(dot);
        wrap.appendChild(row);
      });

      return wrap;
    }

    function getSubstepLabel(node, idx) {
      const base = node.substeps[idx];
      if (!node.expectedOutput || idx !== node.substeps.length - 1) return base;
      return { text: base, example: node.expectedOutput };
    }

    function normalizeSubstepText(text) {
      if (!text) return "";
      let value = text;
      value = value.replace(/下のコマンドをコピーして\s*(PowerShell|Powershell|Terminal)\s*に貼り付ける/gi, "下のコマンドをコピー");
      if (/^Enter を押す$/.test(value.trim())) {
        value = "貼り付けてEnterを押す";
      }
      return value;
    }

    function createCelebrateBand() {
      const wrap = document.createElement("div");
      wrap.className = "celebrate";
      const colors = ["#4ecb88", "#7edcaa", "#2b9983", "#f4c95d", "#7fa4ff"];
      for (let i = 0; i < 18; i += 1) {
        const c = document.createElement("span");
        c.className = "confetti";
        c.style.left = `${Math.floor(Math.random() * 100)}%`;
        c.style.background = colors[i % colors.length];
        c.style.animationDelay = `${(i % 6) * 50}ms`;
        wrap.appendChild(c);
      }
      return wrap;
    }

    function clearTypeTimers() {
      if (!state.typeTimers.length) return;
      state.typeTimers.forEach((id) => clearTimeout(id));
      state.typeTimers = [];
    }

    function scheduleTypeTimer(fn, delay) {
      const id = setTimeout(fn, delay);
      state.typeTimers.push(id);
    }

    function runTypewriter(root) {
      if (!root) return;
      if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

      const targets = Array.from(root.querySelectorAll(".node-head h3, .node-desc-text, .substep-main"));
      if (!targets.length) return;

      let startDelay = 60;
      targets.forEach((el) => {
        const fullText = el.textContent || "";
        if (!fullText.trim()) return;
        el.textContent = "";

        const charDelay = fullText.length > 55 ? 9 : 13;
        for (let i = 1; i <= fullText.length; i += 1) {
          scheduleTypeTimer(() => {
            el.textContent = fullText.slice(0, i);
          }, startDelay + (i * charDelay));
        }

        startDelay += (fullText.length * charDelay) + 130;
      });
    }

    function createCodeCard(command, shellMeta = { text: "コマンド", icon: null, kind: "plain" }) {
      const card = document.createElement("section");
      card.className = "ps-card";

      const top = document.createElement("div");
      top.className = "ps-top";
      const shellTag = document.createElement("span");
      shellTag.className = "shell-tag";
      if (shellMeta.icon) {
        const icon = document.createElement("img");
        icon.src = shellMeta.icon;
        icon.alt = shellMeta.text;
        shellTag.appendChild(icon);
      }
      const text = document.createElement("span");
      text.textContent = shellMeta.text;
      if (shellMeta.kind === "powershell") text.className = "shell-blue";
      shellTag.appendChild(text);
      top.appendChild(shellTag);

      const copy = document.createElement("button");
      copy.type = "button";
      copy.className = "copy-btn";
      copy.innerHTML = `<video src="./assets/next_arrow.webm" autoplay muted loop playsinline></video><span>コピー</span>`;
      copy.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(command);
          copy.innerHTML = `<video src="./assets/next_arrow.webm" autoplay muted loop playsinline></video><span>コピーしました</span>`;
          maybeShowPasteWarning(shellMeta, copy);
          setTimeout(() => { copy.innerHTML = `<video src="./assets/next_arrow.webm" autoplay muted loop playsinline></video><span>コピー</span>`; }, 1500);
        } catch (_e) {
          copy.innerHTML = `<video src="./assets/next_arrow.webm" autoplay muted loop playsinline></video><span>コピー失敗</span>`;
          setTimeout(() => { copy.innerHTML = `<video src="./assets/next_arrow.webm" autoplay muted loop playsinline></video><span>コピー</span>`; }, 1500);
        }
      });

      top.appendChild(copy);
      card.appendChild(top);

      const pre = document.createElement("pre");
      pre.textContent = command;
      card.appendChild(pre);

      return card;
    }

    function maybeShowPasteWarning(shellMeta, anchorEl) {
      const hide = localStorage.getItem("hidePasteWarning") === "1";
      const isPasteFlow = shellMeta.kind === "powershell" || shellMeta.kind === "terminal";
      if (hide || !isPasteFlow) return;

      const old = document.querySelector(".copy-tip");
      if (old) old.remove();

      const tip = document.createElement("div");
      tip.className = "copy-tip";
      tip.innerHTML = `
        <div class="copy-tip-head"><img src="./assets/warning.png" alt="warning"><span>貼り付け時の確認</span></div>
        <div>警告が出る場合がありますが、この手順では想定内です。続行して問題ありません。</div>
      `;
      const hideBtn = document.createElement("button");
      hideBtn.type = "button";
      hideBtn.className = "copy-tip-hide";
      hideBtn.textContent = "次から表示しない";
      hideBtn.addEventListener("click", () => {
        localStorage.setItem("hidePasteWarning", "1");
        tip.remove();
      });
      tip.appendChild(hideBtn);
      document.body.appendChild(tip);
      if (anchorEl) {
        const rect = anchorEl.getBoundingClientRect();
        tip.style.top = `${Math.max(12, rect.bottom + 8)}px`;
        tip.style.left = `${Math.max(12, rect.right - 280)}px`;
      }
      setTimeout(() => tip.remove(), 5000);
    }

    function formatInstructionText(text) {
      if (!text) return "";
      let html = escapeHtml(text);
      html = html.replace(/powershell/gi, '<span class="inline-shell"><img src="./assets/Powershell.png" alt="PowerShell"><span class="shell-blue">PowerShell</span></span>');
      html = html.replace(/terminal/gi, '<span class="inline-shell"><img src="./assets/Terminal.png" alt="Terminal"><span class="shell-blue">Terminal</span></span>');
      return html;
    }

    function triggerScreenBurst() {
      const layer = document.createElement("div");
      layer.className = "screen-burst";
      const colors = ["#4ecb88", "#7edcaa", "#2b9983", "#f4c95d", "#7fa4ff"];
      for (let i = 0; i < 52; i += 1) {
        const c = document.createElement("span");
        c.className = "confetti";
        c.style.left = `${Math.floor(Math.random() * 100)}%`;
        c.style.top = `${Math.floor(Math.random() * 22)}%`;
        c.style.background = colors[i % colors.length];
        c.style.animationDelay = `${(i % 10) * 40}ms`;
        layer.appendChild(c);
      }
      document.body.appendChild(layer);
      setTimeout(() => layer.remove(), 1500);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
